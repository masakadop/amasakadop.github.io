<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitHub×Codexハウツースライド (remark.js)" />
    <title>GitHub×Codex How To Slides</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #050508;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
      }

      .remark-slide-content {
        background: #050508;
        color: #e8fffb;
        font-size: 1.9rem;
        line-height: 1.5;
      }

      .remark-slide-content h1,
      .remark-slide-content h2,
      .remark-slide-content h3 {
        color: #79f4ff;
        line-height: 1.2;
      }

      .remark-inline-code,
      .remark-code {
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      }

      .remark-code {
        font-size: 1.2rem;
        border-radius: 10px;
      }

      .remark-slide-number {
        color: #9ce4ff;
      }

      .loading,
      .error {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        color: #e8fffb;
      }

      .error {
        color: #ffd6d6;
      }
    </style>
  </head>
  <body>
    <div id="status" class="loading">スライドを読み込み中...</div>

    <script src="https://cdn.jsdelivr.net/npm/remark@0.15.0/remark.min.js"></script>
    <script>
      const markdownCandidates = [
        './how-to-codex.md',
        'https://raw.githubusercontent.com/masakadop/masakadop.github.io/main/slides/how-to-codex.md'
      ];

      function looksLikeHtml(text) {
        const sample = text.trim().slice(0, 200).toLowerCase();
        return sample.startsWith('<!doctype html') || sample.startsWith('<html');
      }

      async function loadMarkdown() {
        const errors = [];

        for (const url of markdownCandidates) {
          try {
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const markdown = await response.text();
            if (looksLikeHtml(markdown)) {
              throw new Error('MarkdownではなくHTMLが返されました');
            }

            return markdown;
          } catch (error) {
            errors.push(`${url}: ${error.message}`);
          }
        }

        throw new Error(errors.join(' / '));
      }

      async function boot() {
        const statusEl = document.getElementById('status');

        try {
          const markdown = await loadMarkdown();
          statusEl.remove();

          remark.create({
            source: markdown,
            ratio: '16:9',
            navigation: {
              scroll: false,
              touch: true,
              click: false
            },
            highlightStyle: 'monokai'
          });
        } catch (error) {
          statusEl.className = 'error';
          statusEl.innerHTML = `スライドの表示に失敗しました。<br><small>${error.message}</small>`;
        }
      }

      boot();
    </script>
  </body>
</html>
