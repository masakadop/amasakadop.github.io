<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitHub×Codexハウツースライド (remark.js)" />
    <title>GitHub×Codex How To Slides</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #050508;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
      }

      .remark-slide-content {
        background: #050508;
        color: #e8fffb;
        font-size: 1.9rem;
        line-height: 1.5;
      }

      .remark-slide-content h1,
      .remark-slide-content h2,
      .remark-slide-content h3 {
        color: #79f4ff;
        line-height: 1.2;
      }

      .remark-inline-code,
      .remark-code {
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      }

      .remark-code {
        font-size: 1.2rem;
        border-radius: 10px;
      }

      .remark-slide-number {
        color: #9ce4ff;
      }

      .loading,
      .error {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        color: #e8fffb;
      }

      .error {
        color: #ffd6d6;
      }

      .error small {
        display: block;
        margin-top: 8px;
        color: #ffd6d6;
        opacity: 0.9;
      }

      .warning-banner {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 194, 194, 0.55);
        background: rgba(61, 0, 0, 0.8);
        color: #ffe7e7;
        font-size: 0.95rem;
        line-height: 1.4;
        z-index: 9999;
        backdrop-filter: blur(2px);
      }

      .warning-banner strong {
        display: block;
        margin-bottom: 4px;
      }

      .fallback-plain {
        margin: 24px;
        padding: 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 194, 194, 0.45);
        background: rgba(0, 0, 0, 0.5);
        color: #ffe7e7;
        white-space: pre-wrap;
        font-size: 0.95rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="status" class="loading">スライドを読み込み中...</div>
    <script id="fallback-markdown" type="text/markdown">
class: center, middle

`slides/how-to-codex.md` の読み取りに失敗したため、
このHTMLに直書きしたデフォルト版スライドを表示しています。

エラー原因は画面上部の赤いメッセージで確認できます。

    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/remark/0.15.0/remark.min.js"></script>
    <script>
      const fallbackMarkdownNode = document.getElementById('fallback-markdown');
      const fallbackMarkdown = fallbackMarkdownNode && fallbackMarkdownNode.textContent
        ? fallbackMarkdownNode.textContent.trim()
        : '';
      const markdownCandidates = [
        './how-to-codex.md',
        'https://raw.githubusercontent.com/masakadop/masakadop.github.io/main/slides/how-to-codex.md'
      ];

      function looksLikeHtml(text) {
        const sample = text.trim().slice(0, 200).toLowerCase();
        return sample.startsWith('<!doctype html') || sample.startsWith('<html');
      }

      async function loadMarkdown() {
        const errors = [];

        for (const url of markdownCandidates) {
          try {
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const markdown = await response.text();
            if (looksLikeHtml(markdown)) {
              throw new Error('MarkdownではなくHTMLが返されました');
            }

            return { markdown, source: url };
          } catch (error) {
            errors.push(`${url}: ${error.message}`);
          }
        }

        throw new Error(errors.join(' / '));
      }

      function showLoadErrorBanner(message) {
        const banner = document.createElement('div');
        banner.className = 'warning-banner';
        banner.innerHTML = `<strong>Markdown読み込み失敗</strong><span>${message}</span>`;
        document.body.appendChild(banner);
      }

      function showFatalError(message, fallbackText) {
        const statusEl = document.getElementById('status');
        statusEl.className = 'error';
        statusEl.innerHTML = `スライドの表示に失敗しました。<small>${message}</small>`;

        if (fallbackText) {
          const pre = document.createElement('pre');
          pre.className = 'fallback-plain';
          pre.textContent = fallbackText;
          document.body.appendChild(pre);
        }
      }

      async function boot() {
        const statusEl = document.getElementById('status');
        let markdown = fallbackMarkdown;
        let loadError = null;

        try {
          const loaded = await loadMarkdown();
          markdown = loaded.markdown;
        } catch (error) {
          loadError = error;
        }

        try {
          if (!window.remark || typeof window.remark.create !== 'function') {
            throw new Error('remark.jsの読み込みに失敗しました');
          }

          remark.create({
            source: markdown || '# スライドデータがありません',
            ratio: '16:9',
            navigation: {
              scroll: false,
              touch: true,
              click: false
            },
            highlightStyle: 'monokai'
          });

          statusEl.remove();

          if (loadError) {
            showLoadErrorBanner(loadError.message);
          }
        } catch (error) {
          const detail = loadError
            ? `Markdown読み込み失敗: ${loadError.message} / スライド描画失敗: ${error.message}`
            : error.message;
          showFatalError(detail, fallbackMarkdown);
        }
      }

      boot();
    </script>
  </body>
</html>
