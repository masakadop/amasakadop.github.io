<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="@masakadop の公式リンク集" />
    <title>@masakadop | Link to Bio</title>
    <style>
      :root {
        --bg: #fff4e8;
        --card: #fff0df;
        --text: #4a2b14;
        --muted: #8a5a36;
        --button: #ffb066;
        --button-hover: #ff9a3c;
        --border: #f2a25d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #ffe0bf 0%, #ffd0a0 55%, #ffc18a 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px 16px;
      }

      .container {
        width: 100%;
        max-width: 440px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px 20px;
        text-align: center;
      }

      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        background: #ffb066;
        border: 2px solid #f08d35;
        font-weight: 700;
        font-size: 1.3rem;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .subtitle {
        margin: 6px 0 20px;
        color: var(--muted);
      }

      .links {
        display: grid;
        gap: 12px;
      }

      .link {
        display: block;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--button);
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
      }

      .link:hover,
      .link:focus-visible {
        background: var(--button-hover);
      }

      .note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.84rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card" aria-label="プロフィールリンク">
        <div class="avatar" aria-hidden="true">M</div>
        <h1>@masakadop</h1>
        <p class="subtitle">Link to Bio</p>

        <nav class="links" aria-label="外部リンク">
          <a class="link" href="https://x.com/masakadop" target="_blank" rel="noopener noreferrer">X (旧Twitter)</a>
          <a class="link" href="https://www.showroom-live.com/room/profile?room_id=320392" target="_blank" rel="noopener noreferrer">SHOWROOM</a>
        </nav>

        <p class="note">Thanks for visiting.</p>
      </section>
    </main>
  </body>
</html>
