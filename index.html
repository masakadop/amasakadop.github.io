<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="@masakadop の公式リンク集" />
    <title>@masakadop | Link to Bio</title>
    <style>
      :root {
        --bg: #050508;
        --card: rgba(8, 8, 14, 0.86);
        --text: #e8fffb;
        --muted: #79f4ff;
        --button: linear-gradient(120deg, #00f6ff 0%, #ff00d4 45%, #9d00ff 100%);
        --button-hover: linear-gradient(120deg, #5dfdff 0%, #ff4de4 45%, #b54dff 100%);
        --border: rgba(0, 255, 209, 0.65);
        --shadow: rgba(184, 0, 255, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(0, 255, 255, 0.25) 0%, transparent 30%),
          radial-gradient(circle at 90% 25%, rgba(255, 0, 225, 0.22) 0%, transparent 32%),
          radial-gradient(circle at 50% 90%, rgba(135, 0, 255, 0.22) 0%, transparent 40%),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 3px),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px 16px;
      }

      .container {
        width: 100%;
        max-width: 440px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px 20px;
        text-align: center;
        backdrop-filter: blur(2px);
        box-shadow:
          0 0 0 1px rgba(255, 0, 255, 0.2),
          0 0 24px var(--shadow),
          0 0 56px rgba(0, 208, 255, 0.24);
      }

      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 25% 25%, #f3f3ff 0%, #00fff2 30%, #8500ff 100%);
        border: 2px solid rgba(255, 0, 221, 0.9);
        font-weight: 700;
        font-size: 1.3rem;
        color: #04070e;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: 0.06em;
        text-shadow: 0 0 12px rgba(0, 255, 242, 0.75);
      }

      .subtitle {
        margin: 6px 0 20px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.85rem;
      }

      .links {
        display: grid;
        gap: 12px;
      }

      .link {
        display: block;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--button);
        border: 1px solid rgba(255, 255, 255, 0.22);
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        box-shadow: 0 0 14px rgba(0, 255, 247, 0.45);
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      }

      .link:hover,
      .link:focus-visible {
        background: var(--button-hover);
        transform: translateY(-1px) scale(1.01);
        box-shadow:
          0 0 12px rgba(255, 0, 221, 0.7),
          0 0 24px rgba(0, 255, 247, 0.5);
        filter: saturate(1.15);
      }

      .note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.84rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card" aria-label="プロフィールリンク">
        <div class="avatar" aria-hidden="true">M</div>
        <h1>@masakadop</h1>
        <p class="subtitle">Neon Link Portal</p>

        <nav class="links" aria-label="外部リンク">
          <a class="link" href="https://x.com/masakadop" target="_blank" rel="noopener noreferrer">X (旧Twitter)</a>
          <a class="link" href="https://github.com/masakadop" target="_blank" rel="noopener noreferrer">GitHub</a>
          <a class="link" href="https://slides.deno.dev/html?url=https://masakadop.github.io/slides/how-to-codex.md" target="_blank" rel="noopener noreferrer">GitHub×Codex How To (Slides)</a>
          <a class="link" href="https://www.showroom-live.com/room/profile?room_id=320392" target="_blank" rel="noopener noreferrer">SHOWROOM</a>
        </nav>

        <p class="note">Stay wired. Stay loud.</p>
      </section>
    </main>
  </body>
</html>
